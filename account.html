<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCOUNT</title>
    <link rel="stylesheet" href="css/account.css">
</head>

<body>
    <a href="in.html" class="home">&#x1F3E0;HOME</a>
    <div class="container">
        <p>CREATE AN ACCOUNT</p>
        <form id="form" action="" method="post">
            <fieldset>
                <legend>Fill all the blanks with your appropriate informations</legend>
                <div class="input-group">
                    <label for="nom">Last name</label>
                    <input type="text" id="nom" name="nom" placeholder="Enter your last name here..." required>
                </div>
                <div class="input-group">
                    <label for="prenom">First name</label>
                    <input type="text" id="prenom" name="prenom" placeholder="Enter your first name here..." required>
                </div>
                <div class="input-group">
                    <label for="date">Date of birth</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Exemple@gmail.com" required>
                    <span class="error-message" id="email-error"></span>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" placeholder="Enter your password here..." required>
                </div>
                <div class="input-group">
                    <label for="adresse">Address</label>
                    <input type="text" id="adresse" name="adresse" placeholder="Enter your address here..." required>
                </div>
            </fieldset>
            <div class="button-group">
                <button type="submit">Create</button>
                <button type="reset" class="reset-btn">Reset</button>
                <button type="button">Log in another account</button>
            </div>
        </form>
    </div>
    <div class="photo"><img src="photo/movie-posters.jpg" alt="" class="background_image"></div>
    <script src="javascript/account.js"></script>
</body>

</html>
